PACKAGE_NAME="tn40xx"
PACKAGE_VERSION="0.3.6.16.1"
BUILT_MODULE_NAME[0]="tn40xx"
DEST_MODULE_LOCATION[0]="/updates/dkms"
# MV88X3310=YES is REQUIRED: enables the Marvell PHY (0x4027) + firmware upload.
# KVERSION override lets dkms build for any target kernel, not just the running one.
MAKE[0]="make MV88X3310=YES KVERSION=${kernelver}"
CLEAN="make clean KVERSION=${kernelver}"
AUTOINSTALL="yes"
